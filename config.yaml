# ── 연구 프로필 (Haiku 스코어링 컨텍스트) ──────────────────────
profile:
  text: >
    Condensed matter physicist specializing in first-principles calculations
    of electron-phonon interactions, quasiparticle properties (GW approximation),
    and optical spectra (Bethe-Salpeter equation). Uses and develops ab initio
    software such as EPW, Quantum ESPRESSO, BerkeleyGW, Wannier90, SIESTA, and
    VASP. Interested in semiconductors, phonon physics, topological materials,
    and emerging ML-driven interatomic potentials.

  core_interests:
    - electron-phonon coupling
    - GW approximation / quasiparticle self-energy
    - Bethe-Salpeter equation (BSE) / optical spectra
    - Wannier interpolation
    - phonon dispersion and thermal transport
    - semiconductor band structure
    - density functional theory (DFT)

  methods:
    - EPW
    - Quantum ESPRESSO
    - BerkeleyGW
    - Wannier90
    - VASP
    - SIESTA / TranSIESTA
    - DFPT

  emerging_interests:
    - topological insulators / semimetals
    - machine-learning interatomic potentials
    - moiré / twisted bilayer systems
    - phonon polaritons

# ── 출력 ───────────────────────────────────────────────────────
output:
  top_n: 1000                     # 표시할 상위 논문 수
  score_threshold: 1            # 1–5점 중 이 미만은 숨김
  max_age_days: 2               # 최근 N일 이내 논문만 표시
