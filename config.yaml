# ── 연구 프로필 (Haiku 스코어링 컨텍스트) ──────────────────────
# 이 블록은 scripts/build-profile.py가 LANDFALL values + graph + filters에서 자동 생성.
# 직접 편집하지 말고 LANDFALL 쪽(values.md, graph/*/, filters.md)을 수정한 뒤
# `python3 scripts/build-profile.py`로 재생성할 것.
profile:
  text: |
    Condensed matter physicist trained in first-principles many-body perturbation theory
    (GW/BSE, EPW electron-phonon, GWPT). Currently visiting BerkeleyGW main developer group
    (Zhenglu Li, USC, 2026.04~09).

    Project LANDFALL — no fixed research tracks. Evaluation axes:

    (1) Values (intrinsic motivation, weighted):
    - 에너지 (weight 0.6, direct)
    - 우주항공 (weight 0.4, either)

    (2) Active graph (current projects and methods):
    - 2d-exciton-nn [submitted] — venue: Nature Nanotechnology
    - ag3si-gw [active] — venue: PRB / PRM / npj Comput Mater / Nat Mater (확장 시)
    - ai-agent-mbpt [active] — venue: Comp Phys Comm / npj Comput Mater / J Chem Theory Comput
    - bi2o2se-gwpt [active] — venue: PRB / Nat Commun / npj Comput Mater
    - hpc-exascale [seed] — venue: Comp Phys Comm / 물리 방법론 venue (SC proceedings 아님)

    (3) Invariant skill stack: MBPT physics (GW/BSE/EPW/GWPT, DFPT, Wannier) + HPC exascale
        + AI workflow automation. Tool/code is free — constraint is venue.

    (4) Venue constraint: physics-adjacent journals up to ACS Nano (inclusive).
        PRB, PRL, PRM, PR Applied, Nat Phys, Nat Mater, Nat Nano, Nat Commun,
        npj Comput Mater, APL, ACS Nano, Nano Lett., 2D Mater., Comp Phys Comm, J Chem Theory Comput — in.

    Score papers high (4-5) if they connect to any of:
    (a) MBPT methodology advance (GW/BSE/EPW/GWPT)
    (b) Active graph materials (Bi2O2Se / Ag3SI / TMD heterostructure) or project topics
    (c) Values axis (energy absorber materials, aerospace-adjacent physics)

    OUT OF VENUE — cap at 1:
        - materials engineering venues (Acta Mater, Scripta Mater, etc.)
        - pure chemistry venues (JACS, Angew Chem — excluding J. Phys. Chem. C/Letters)
        - SC proceedings and CS-only HPC venues
        - ML workshops (NeurIPS, ICLR physics workshops) — methodology paper must be in physics venue
        - IEEE engineering venues (IEEE TED borderline; pure power electronics out)
        - biology, climate, astrophysics, cold-atom quantum info

    SKILL GAP — cap at 3 unless paper has direct MBPT-stack connection OR active-graph connection
    OR values (energy/aerospace) connection:
        - DMFT / Hubbard / strongly correlated electron physics as core method (Mott, Kondo, heavy fermion)
        - MLIP / machine learning force fields without MBPT connection (MACE, CHGNet, NequIP)
        - pure DFT+U defect studies without GW
        - classical molecular dynamics (LAMMPS, OpenMM, GROMACS)
        - moire superconductivity / twistronics phase diagrams
        - Kagome metal CDW / superconductivity
        - model Hamiltonian transport on toy models (Dirac / k·p / TB + NEGF toy)
        - topological transport / Berry phase anomaly studies on model Hamiltonians
        - phenomenological device modeling (TMR, GMR, spin-valve) without first-principles input
        - CO2 reduction catalysis, water splitting electrochemistry
        - battery cathode / electrolyte materials (engineering venue + MBPT-disconnected)
  high_priority_topics:
  - '[values:에너지 w=0.6] photovoltaic absorber materials (chalcohalide, chalcogenide, perovskite beyond
    MAPbI3)'
  - '[values:에너지 w=0.6] solar cell absorber — GW band gap + BSE optical absorption'
  - '[values:에너지 w=0.6] dielectric screening in PV absorbers'
  - '[values:에너지 w=0.6] defect tolerance in photovoltaic semiconductors'
  - '[values:에너지 w=0.6] emerging photovoltaic materials beyond MAPbI3'
  - '[values:에너지 w=0.6] GW-level first-principles for energy materials'
  - '[values:우주항공 w=0.4] radiation-hardened semiconductors (defect physics from MBPT)'
  - '[values:우주항공 w=0.4] space telescope photodetectors, optical materials'
  - '[values:우주항공 w=0.4] high-power semiconductors (β-Ga2O3, GaN) for orbital communication'
  - '[values:우주항공 w=0.4] extreme-environment semiconductor devices'
  - '[2d-exciton-nn:submitted] interlayer / moiré excitons in TMD heterostructures (GW-BSE)'
  - '[2d-exciton-nn:submitted] exciton optical selection rules, valley physics, Γ-valley emission'
  - '[2d-exciton-nn:submitted] 2D heterostructure optoelectronics'
  - '[2d-exciton-nn:submitted] photodetector / optoelectronic devices with 2D semiconductors'
  - '[2d-exciton-nn:submitted] dark excitons, trions in TMD'
  - '[ag3si-gw:active] silver / copper chalcohalide semiconductors (Ag3SI, Cu3SI, AgCuS)'
  - '[ag3si-gw:active] chalcohalide / antiperovskite photovoltaics'
  - '[ag3si-gw:active] solar cell absorber — GW band gap + BSE optical absorption'
  - '[ag3si-gw:active] disorder / alloy effects on dielectric screening and band gap'
  - '[ag3si-gw:active] local disorder / polymorphous representation in perovskites and analogues'
  - '[ag3si-gw:active] defect tolerance in photovoltaic semiconductors'
  - '[ag3si-gw:active] emerging photovoltaic materials beyond MAPbI3 (chalcogenides, oxides, halides)'
  - '[ag3si-gw:active] anharmonic electron-phonon renormalization in ionic semiconductors'
  - '[ai-agent-mbpt:active] LLM agents / autonomous agents for scientific computing'
  - '[ai-agent-mbpt:active] AI workflow automation for ab initio (DFT / GW / EPW) calculations'
  - '[ai-agent-mbpt:active] convergence test automation, hyperparameter search for MBPT'
  - '[ai-agent-mbpt:active] code generation / scientific software automation with LLMs'
