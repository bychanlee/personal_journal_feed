# ── 연구 프로필 (Haiku 스코어링 컨텍스트) ──────────────────────
profile:
  text: >
    Condensed matter physicist with a first-principles calculation background
    (electron-phonon interactions, GW, BSE). Primary goal of this feed is to
    catch important NEW experimental observations in condensed matter and
    materials physics for rapid follow-up. Computational papers are secondary
    — tracked mainly to monitor what major groups in the field are working on.

  # 높은 우선순위: 새로운 실험적 관측·발견
  high_priority_topics:
    - topological quantum phenomena (new phases, edge states, quantized responses)
    - 2D materials / moiré systems (new correlated phases, flat-band physics)
    - phonon physics (thermal transport, phonon polaritons, topological phonons)
    - altermagnets (experimental confirmation, new materials)
    - quantum geometry effects (Berry curvature dipole, quantum metric measurements)
    - exciton physics (moiré excitons, interlayer excitons, optical signatures)
    - kagome metals (CDW, unconventional superconductivity, electron correlation)
    - nonlinear transport / bulk photovoltaic effect (symmetry breaking signatures)
    - orbital magnetism / orbital Hall effect
    - light-induced phases / Floquet engineering (pump-probe experiments)

  # 보통 우선순위: 동향 파악용
  background_topics:
    - electron-phonon coupling (ab initio methods)
    - GW / BSE calculations
    - DFT methodology advances
    - high-throughput / autonomous materials discovery

  methods:
    - EPW
    - Quantum ESPRESSO
    - BerkeleyGW
    - Wannier90
    - VASP
    - SIESTA / TranSIESTA
    - DFPT

# ── 출력 ───────────────────────────────────────────────────────
output:
  top_n: 1000                     # 표시할 상위 논문 수
  score_threshold: 1            # 1–5점 중 이 미만은 숨김
  max_age_days: 2               # 최근 N일 이내 논문만 표시
