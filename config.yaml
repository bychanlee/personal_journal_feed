# ── 연구 프로필 (Haiku 스코어링 컨텍스트) ──────────────────────
profile:
  text: >
    Condensed matter physicist with a first-principles calculation background
    (electron-phonon interactions, GW, BSE) building a multi-scale simulation
    bridge from first-principles to TCAD device simulation. Primary goals:
    (1) catch important NEW experimental observations in condensed matter and
    materials physics, (2) track DFT/GW-to-TCAD bridging work and 2D TMD
    device physics for semiconductor industry applications. Computational
    papers are secondary — tracked mainly to monitor major groups.

  # 높은 우선순위: LANDFALL 직결 — 소자 파라미터/TCAD 입력으로 이어지는 것
  high_priority_topics:
    # ── 소자 물리 / TCAD ──
    - 2D semiconductor channel materials (TMD, Bi₂O₂Se, β-Ga₂O₃, tellurene — device experiments)
    - 2D TMD FET device physics (carrier mobility, contact resistance, channel scaling)
    - TCAD simulation with first-principles parameters (DFT-to-TCAD, GW-informed device modeling)
    - GW-level device parameters (effective mass, dielectric constant, band alignment at interfaces)
    - GAA / CFET / nanosheet transistor architecture and scaling
    # ── 접촉 / 계면 ──
    - metal-semiconductor contact / Schottky barrier (GW band alignment, contact resistance)
    - high-k gate dielectrics and channel-dielectric interfaces (CaF₂, LaOCl, hBN)
    - band alignment at heterointerfaces (channel/dielectric/metal)
    # ── 수송 ──
    - carrier mobility from first principles (e-ph scattering, Boltzmann transport)
    - high-field carrier transport / velocity saturation
    - polaron transport (self-trapped carriers, β-Ga₂O₃)
    - spin-orbit coupling effects on transport (SOC+EPW)
    # ── 양자 구속 / 박막 ──
    - quantum confinement in ultrathin channels (thickness-dependent parameters)
    - dielectric screening in 2D / thin films (environment-dependent ε)
    # ── 밴드갭 / 결함 ──
    - electron-phonon renormalization of band gaps (temperature-dependent gap, Varshni)
    - defect levels in wide-bandgap semiconductors (SRH lifetime, trap states)
    # ── 열 수송 ──
    - thermal transport in nanoscale channels (phonon BTE, channel self-heating)
    - phonon-mediated thermal conductivity in 2D materials

  # 보통 우선순위: 동향 파악용
  background_topics:
    - electron-phonon coupling methodology (ab initio methods, EPW developments)
    - GW / BSE calculations
    - DFT methodology advances
    - high-throughput / autonomous materials discovery
    - exciton physics (optical absorption for photodetector TCAD)
    - TCAD methodology (Sentaurus, DEVSIM, Victory Process/Device)
    - semiconductor device scaling (DTCO, backside power delivery, interconnect RC)

  methods:
    - EPW
    - Quantum ESPRESSO
    - BerkeleyGW
    - Wannier90
    - VASP
    - SIESTA / TranSIESTA
    - DFPT
    - DEVSIM
    - Sentaurus TCAD
    - BoltzTraP / BoltzWann

# ── 출력 ───────────────────────────────────────────────────────
output:
  top_n: 1000                     # 표시할 상위 논문 수
  score_threshold: 1            # 1–5점 중 이 미만은 숨김
  max_age_days: 2               # 최근 N일 이내 논문만 표시
