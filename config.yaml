# ── 연구 프로필 (Haiku 스코어링 컨텍스트) ──────────────────────
# 정적 프로필 — 수동 편집.
profile:
  text: |
    Condensed matter physicist trained in first-principles many-body perturbation theory
    (GW/BSE, EPW electron-phonon, GWPT). Currently visiting BerkeleyGW main developer group
    (Zhenglu Li, USC, 2026.04~09).

    Current focused research clusters:

    (A) Bi2O2Se & layered semiconductor transport
        - Phonon-limited mobility via GWPT vs DWPT (Fröhlich, soft modes)
        - Quasiparticle band structure, Wannier-based tight-binding modeling
        - 2D semiconductor FET channel candidates (TMD, β-Ga2O3, tellurene, Bi2O2Se)

    (B) Chalcohalide / PV absorber GW
        - Ag3SI / Cu3SI silver chalcohalides as PV absorbers
        - Disorder effects on QP gap: supercell GW vs unit-cell χ unfolding methodology
        - Broader PV absorbers (chalcohalide, chalcogenide, perovskite-adjacent)
        - Defect tolerance, dielectric screening in absorber materials

    (C) AI agents for ab-initio computational workflows
        - LLM agents orchestrating GW/BSE/EPW pipelines on HPC
        - Domain knowledge distillation into SKILLs for autonomous CMS
        - Convergence test automation, hyperparameter search for MBPT
        - Result validation, silently-wrong-result catching

    (D) MBPT methodology & exascale acceleration
        - EPW / Wannier-basis e-ph matrix element selection rules (zero-block skipping)
        - Band / χ matrix unfolding for supercells and disordered systems
        - GPU porting of BerkeleyGW / EPW / QE on Frontier / Aurora / Perlmutter
        - Parallel scaling of GW / BSE / DFPT / EPW on exascale

    Invariant skill stack: MBPT physics (GW/BSE/EPW/GWPT, DFPT, Wannier) + HPC exascale
    + AI workflow automation. Tool/code is free — constraint is venue.

    Score papers high (4-5) if they connect to any of clusters A-D directly.
    Score 2-3 for background topics (general MBPT methodology, 2D exciton physics,
    HPC infrastructure trends, AI-for-science, AiiDA workflow plumbing).
    Score 1 for out-of-venue or out-of-scope (see caps below).

    Venue scope (in-scope, up to ACS Nano inclusive):
        PRB, PRL, PRX, PRM, PR Applied, Nat Phys, Nat Mater, Nat Nano, Nat Commun,
        npj Comput Mater, APL, ACS Nano, Nano Lett., 2D Mater., Comp Phys Comm,
        J Chem Theory Comput.

    OUT OF VENUE — cap at 1:
        - materials engineering venues (Acta Mater, Scripta Mater)
        - pure chemistry venues (JACS, Angew Chem — J. Phys. Chem. C/Letters OK)
        - SC proceedings and CS-only HPC venues
        - ML workshops (NeurIPS, ICLR physics workshops) — methodology paper must be in physics venue
        - IEEE engineering venues (TED borderline; pure power electronics out)
        - biology, climate, astrophysics, cold-atom quantum info

    OUT OF SCOPE — cap at 2 (unless direct cluster A-D connection):
        - DMFT / Hubbard / strongly correlated electron physics as core method (Mott, Kondo, heavy fermion)
        - MLIP / machine learning force fields without MBPT connection (MACE, CHGNet, NequIP)
        - pure DFT+U defect studies without GW
        - classical molecular dynamics (LAMMPS, OpenMM, GROMACS)
        - moiré superconductivity / twistronics phase diagrams
        - Kagome metal CDW / superconductivity
        - model Hamiltonian transport on toy models (Dirac / k·p / TB+NEGF toy)
        - topological transport / Berry phase anomaly on model Hamiltonians
        - phenomenological device modeling (TMR, GMR, spin-valve) without first-principles input
        - CO2 reduction catalysis, water splitting electrochemistry
        - battery cathode / electrolyte materials (engineering venue + MBPT-disconnected)
        - moiré / twisted bilayer flat-band physics (no MBPT angle)
        - exfoliation-only 2D flakes without scalable growth pathway
