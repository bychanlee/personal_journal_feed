name: Daily Journal Digest

on:
  schedule:
    - cron: "0 20 * * *"     # 05:00 KST daily
  workflow_dispatch:          # 수동 실행 가능

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic certifi feedparser pyyaml

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y/%m)
          mkdir -p "$MONTH"
          python generate.py --output "$MONTH/$DATE.html"

      - name: Commit to main
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y/%m)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MONTH/$DATE.html" "$MONTH/latest.json"
          git diff --cached --quiet || git commit -m "digest: $DATE"
          git push origin main

      - name: Deploy to gh-pages
        run: |
          DATE=$(date +%Y-%m-%d)
          MONTH=$(date +%Y/%m)
          # Save generated files to /tmp
          cp "$MONTH/$DATE.html" /tmp/digest.html
          cp "$MONTH/latest.json" /tmp/latest.json
          cp .nojekyll /tmp/.nojekyll
          # Switch to gh-pages
          git fetch origin gh-pages || true
          git checkout -B gh-pages origin/gh-pages || git checkout --orphan gh-pages
          # Copy dated file into monthly folder
          mkdir -p "$MONTH"
          cp /tmp/digest.html "$MONTH/$DATE.html"
          cp /tmp/latest.json "$MONTH/latest.json"
          # Update index.html to redirect to today's digest
          printf '<!DOCTYPE html>\n<html><head>\n<meta http-equiv="refresh" content="0;url=%s/%s.html">\n</head><body>\n<p>Redirecting to <a href="%s/%s.html">today'\''s digest</a>...</p>\n</body></html>\n' "$MONTH" "$DATE" "$MONTH" "$DATE" > index.html
          cp /tmp/.nojekyll .nojekyll
          git add index.html .nojekyll "$MONTH/$DATE.html" "$MONTH/latest.json"
          git diff --cached --quiet || git commit -m "deploy: $DATE"
          git push origin gh-pages
