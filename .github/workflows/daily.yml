name: Daily Journal Digest

on:
  schedule:
    - cron: "0 21 * * 0-4"   # 06:00 KST Mon-Fri (arXiv posts weekdays)
  workflow_dispatch:          # 수동 실행 가능

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic certifi feedparser pyyaml

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate.py --output index.html

      - name: Commit to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html latest.json
          git diff --cached --quiet || git commit -m "digest: $(date +%Y-%m-%d)"
          git push origin main

      - name: Deploy to gh-pages
        run: |
          cp index.html /tmp/index.html
          cp .nojekyll /tmp/.nojekyll
          git fetch origin gh-pages || true
          git checkout -B gh-pages origin/gh-pages || git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          cp /tmp/index.html index.html
          cp /tmp/.nojekyll .nojekyll
          git add index.html .nojekyll
          git diff --cached --quiet || git commit -m "deploy: $(date +%Y-%m-%d)"
          git push origin gh-pages
